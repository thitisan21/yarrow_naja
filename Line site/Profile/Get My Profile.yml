info:
  name: Get My Profile
  type: http
  seq: 3

http:
  method: GET
  url: "{{url_local}}/line/user/profile"
  auth:
    type: bearer
    token: "{{tokenLine}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
