info:
  name: List merchant by location
  type: http
  seq: 4

http:
  method: GET
  url: "{{url_local}}/line/list/event/geo"
  params:
    - name: latitude
      value: "13.674805802988189"
      type: query
      disabled: true
    - name: longitude
      value: "100.59579212949926"
      type: query
      disabled: true
    - name: sportType
      value: football
      type: query
      description: if more than on use , ex => basket ball,football,batmiton
      disabled: true
  auth:
    type: bearer
    token: "{{tokenLine}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: List merchant by location
    request:
      url: "{{url_local}}/line/list/event/geo?latitude=13.159599357278337&longitude=100.92457524505397"
      method: GET
      params:
        - name: latitude
