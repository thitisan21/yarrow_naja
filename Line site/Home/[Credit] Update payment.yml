info:
  name: "[Credit] Update payment"
  type: http
  seq: 10

http:
  method: PATCH
  url: "{{url_local}}/line/event/payment"
  body:
    type: json
    data: |-
      {
        "paymentType": "CREDIT",
        "id": "69bce8f2b22d3f074ceba4cc",
        "paymentAmount": 81.6,
        "cardId": "67bc59c8188bb43463ca151f",
        "promotionCode": "SSSSSS2" // for promotion
        // "securePayToken": "00acaMDQUaWLeW20gSezDlIF6+AQFvo7Bnhm6wPtQEjG6Er1ik6lZxS4BIbla04cQ88H1H84haXW6KedpR/3KzpcGwYEiDvPBiDNEj4nG4SColJWwDv9DpxsqLY7e22qaiqxh+JtzeBViNPC9yVuvmdFcpvZsRddhtKGrH4DzEnvK3Y=U2FsdGVkX1/+CtXsSeBuq1+5eSnd27F3iXKFYhRvC1OEZYRI8Jzg3gwkGbDZoac7",
        // "isRemember": false,
        // "redirectUrl": "https://localhost:5173/thank/66d967475aeb96cb655dfa27?t=card"
      }
  auth:
    type: bearer
    token: "{{tokenLine}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Case use credit card in store
    request:
      url: "{{url_local}}/line/event/payment"
      method: PATCH
      body:
        type: json
        data: |-
          {
              "paymentType": "CREDIT",
              "id": "67bc123a43ed3253888d5f7d",
              "paymentAmount": 500,
              "cardId": "67bc304e833761dfdc080db0",
              "redirectUrl": "https://localhost:5173/thank/66d967475aeb96cb655dfa27?t=card"
          }
