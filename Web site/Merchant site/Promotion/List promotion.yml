info:
  name: List promotion
  type: http
  seq: 4

http:
  method: GET
  url: "{{url_local}}/backoffice/promotion/list?skip=1&limit=10&status=all&search&sortBy=status&sortOrderBy=asc"
  params:
    - name: skip
      value: "1"
      type: query
    - name: limit
      value: "10"
      type: query
    - name: status
      value: all
      type: query
    - name: search
      value: ""
      type: query
    - name: sortBy
      value: status
      type: query
      description: // eventName, date, time, duration, status
    - name: sortOrderBy
      value: asc
      type: query
      description: // asc, desc
  body:
    type: json
    data: ""
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  status => all, open, pause, expired, cancel
  search => promoTitle
  sortBy => promoTitle, promoDateEnd, createdAt
