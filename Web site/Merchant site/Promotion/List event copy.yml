info:
  name: List event copy
  type: http
  seq: 1

http:
  method: GET
  url: "{{url_local}}/backoffice/event?skip=1&limit=10&status=open&search"
  params:
    - name: skip
      value: "1"
      type: query
    - name: limit
      value: "10"
      type: query
    - name: status
      value: open
      type: query
      description: // all, open, cancelled, ended
    - name: search
      value: ""
      type: query
      description: // eventName
    - name: dateStart
      value: ""
      type: query
      description: // YYYY-MM-DD
      disabled: true
    - name: dateEnd
      value: ""
      type: query
      description: // YYYY-MM-DD
      disabled: true
    - name: sortBy
      value: eventName
      type: query
      description: // eventName, date, time, duration, status
      disabled: true
    - name: sortOrderBy
      value: asc
      type: query
      description: // asc, desc
      disabled: true
  body:
    type: json
    data: ""
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
