      value: 2024-06-01
      type: query
      description: // YYYY-MM-DD
      disabled: true
    - name: dateEnd
      value: 2025-07-01
      type: query
      description: // YYYY-MM-DD
      disabled: true
    - name: skip
      value: "1"
      type: query
    - name: limit
      value: "10"
      type: query
    - name: sortBy
      value: dateStart
      type: query
      description: //eventName, dateStart, total, totalCommission, totalNet
    - name: sortOrderBy
      value: desc
      type: query
      description: // asc, desc
  body:
