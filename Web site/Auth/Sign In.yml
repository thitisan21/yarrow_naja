info:
  name: Sign In
  type: http
  seq: 1

http:
  method: POST
  url: "{{url_local}}/auth/signin"
  body:
    type: json
    data: |-
      {
          "email": "audyttt@gmail.com",
          "password": "8oojkiyd"
          // "email": "a.mod_pumppb@hotmail.co.th",
          // "password": "Aa123456"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const token = res.getBody()
        bru.setEnvVar("token", token.data.accessToken);
        bru.setEnvVar("tokenRefresh", token.data.refreshToken);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
