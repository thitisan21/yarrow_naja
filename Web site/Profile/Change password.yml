info:
  name: Change password
  type: http
  seq: 2

http:
  method: PATCH
  url: "{{url_local}}/auth/changePassword"
  body:
    type: json
    data: |-
      {
          "oldPassword": "uRRj2G",
          "password": "Aa123456"
      }
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        const token = res.getBody()
        bru.setEnvVar("token", token.data.accessToken);
        bru.setEnvVar("tokenRefresh", token.data.refreshToken);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
