info:
  name: List settlement history
  type: http
  seq: 2

http:
  method: GET
  url: "{{url_local}}/backoffice/settlement/history/list?limit=10&month=all&sortOrderBy=asc&skip=1&year=2025&sortBy=status"
  params:
    - name: limit
      value: "10"
      type: query
    - name: month
      value: all
      type: query
      description: // mandatory ex all, 1,2,3,...,12
    - name: search
      value: test12
      type: query
      description: // merchantName
      disabled: true
    - name: sortOrderBy
      value: asc
      type: query
      description: // asc, desc
    - name: skip
      value: "1"
      type: query
    - name: year
      value: "2025"
      type: query
    - name: sortBy
      value: status
      type: query
  body:
    type: json
    data: ""
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
